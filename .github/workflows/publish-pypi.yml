name: Publish talos-agent → PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Upload to TestPyPI instead of PyPI"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write # OIDC trusted publishing (optional; token fallback below)

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/prime-agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Copy LICENSE for sdist
        run: cp ../../LICENSE LICENSE

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.testpypi == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: python -m twine upload --repository testpypi dist/*

      - name: Publish to PyPI
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.testpypi == 'false')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
