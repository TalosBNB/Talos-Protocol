[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "talos-agent"
version = "0.1.1"
description = "Prime Agent CLI for Talos Protocol — autonomous GTM agents on BNB Smart Chain"
readme = "README.md"
license = "AGPL-3.0-only"
license-files = ["LICENSE"]
requires-python = ">=3.10"
authors = [{ name = "Talos Protocol" }]
keywords = ["talos", "agent", "bsc", "x402", "autonomous", "cli"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "openai>=1.30",
    "stagehand>=1.0",
    "httpx>=0.27",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "click>=8.1",
    "rich>=13.7",
    "anthropic>=0.40",
    "requests-oauthlib>=2.0",
]

[project.urls]
Homepage = "https://github.com/talos-protocol/talos-bsc"
Repository = "https://github.com/talos-protocol/talos-bsc"
Documentation = "https://github.com/talos-protocol/talos-bsc/tree/main/packages/prime-agent"
Issues = "https://github.com/talos-protocol/talos-bsc/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
    "build>=1.2",
    "twine>=5.0",
]

[project.scripts]
talos-agent = "talos_agent.cli:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.setuptools.packages.find]
where = ["src"]
